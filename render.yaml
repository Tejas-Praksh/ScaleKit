
# Render.com deployment configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: scalekit-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Database — set in Render dashboard, not committed to git
      - key: POSTGRES_URL
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      # Redis — set in Render dashboard
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_SSL
        value: "true"
      # Application
      - key: APP_BASE_URL
        value: https://scalekit-api.onrender.com
      - key: APP_SECURITY_ADMIN_API_KEY
        sync: false

  - type: web
    name: scalekit-frontend
    env: static
    buildCommand: cd scalekit-frontend && npm install && npm run build
    staticPublishPath: ./scalekit-frontend/dist
    plan: free
    region: singapore
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://scalekit-api.onrender.com
