version: '3.8'

# Lightweight compose for running integration tests.
# Uses tmpfs (RAM) volumes for maximum speed — data is discarded after tests.

services:

  postgres-test:
    image: postgres:15-alpine
    container_name: scalekit-postgres-test
    environment:
      POSTGRES_DB: scalekit_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data   # In-memory: no disk I/O, fastest possible
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d scalekit_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    container_name: scalekit-redis-test
    ports:
      - "6380:6379"
    tmpfs:
      - /data                      # In-memory: no persistence needed for tests
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
