apiVersion: v1
kind: Service
metadata:
  name: scalekit-service
  namespace: scalekit
  labels:
    app: scalekit
spec:
  selector:
    app: scalekit
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP  # Internal only; exposed externally via Ingress
