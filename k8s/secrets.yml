apiVersion: v1
kind: Secret
metadata:
  name: scalekit-secrets
  namespace: scalekit
type: Opaque
# IMPORTANT: Values here are placeholders.
# NEVER commit real secrets to version control!
# To encode a value: echo -n "my-secret" | base64
# To apply real secrets: kubectl apply -f secrets.yml (after editing)
stringData:
  POSTGRES_URL: "jdbc:postgresql://postgres:5432/scalekit"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "REPLACE_ME"
  REDIS_HOST: "redis"
  REDIS_PASSWORD: "REPLACE_ME"
  APP_SECURITY_ADMIN_API_KEY: "REPLACE_ME"
