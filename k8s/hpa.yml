apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scalekit-hpa
  namespace: scalekit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scalekit-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Scale up when average CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # Scale up when average memory > 80%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60  # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60            # Add at most 2 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120           # Remove at most 1 pod every 2 minutes
