spring:
  datasource:
    url: jdbc:h2:mem:scalekit-benchmark;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never
  cache:
    type: none
  data:
    redis:
      repositories:
        enabled: false
